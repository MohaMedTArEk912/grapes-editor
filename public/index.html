<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="Akasha AI Chat – powered by LLaMA 3.1 via OpenRouter" />
  <title>Akasha AI Chat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="header-inner">
        <div class="logo">
          <span class="logo-icon">✦</span>
          <h1>Akasha</h1>
        </div>
        <span class="model-badge">LLaMA 3.1 · 8B</span>
      </div>
    </header>

    <main class="chat-window" id="chatWindow">
      <div class="welcome">
        <div class="welcome-icon">✦</div>
        <p>Ask me anything to get started.</p>
      </div>
    </main>

    <footer class="input-bar">
      <div class="input-inner">
        <textarea
          id="userInput"
          placeholder="Type a message…"
          rows="1"
          autocomplete="off"
        ></textarea>
        <button id="sendBtn" class="send-btn" aria-label="Send">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="20" height="20">
            <path d="M3.478 2.405a.75.75 0 00-.926.94l2.432 7.905H13.5a.75.75 0 010 1.5H4.984l-2.432 7.905a.75.75 0 00.926.94 60.519 60.519 0 0018.445-8.986.75.75 0 000-1.218A60.517 60.517 0 003.478 2.405z" />
          </svg>
        </button>
      </div>
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
